apiVersion: v1
kind: Service
metadata:
  name: user-service # This is the internal URL other microservices will use to call you
spec:
  selector:
    app: user-service # This links the service to the deployment we made above
  ports:
    - protocol: TCP
      port: 80         # The port other services will ping
      targetPort: 5000 # The port your actual Node.js container is listening on
  type: ClusterIP      # This ensures the service is ONLY accessible from inside the cluster